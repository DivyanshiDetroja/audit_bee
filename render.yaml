services:
  - type: web
    name: audit-bee-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    # Persistent disk requires a paid Render plan ($7+/mo). On the free plan,
    # /app/uploads is ephemeral — files reset on redeploy. Reseed before the demo.
    # Uncomment below if you upgrade:
    # disk:
    #   name: uploads
    #   mountPath: /app/uploads
    #   sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: audit-bee-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in the Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render generates a random value on first deploy
      - key: CORS_ORIGIN
        sync: false          # set to your Vercel URL, e.g. https://audit-bee.vercel.app
      - key: APP_ENV
        value: production
      - key: SEED_SECRET
        generateValue: true

databases:
  - name: audit-bee-db
    databaseName: auditbee
    plan: free
